cluster: docker-local
storage:
  url: "s3://flight-recorder-pcaps?region=us-east-1&endpoint=http://minio:9000&s3ForcePathStyle=true&disableSSL=true&awssdk=v2"
hubbleAddress: mock-hubble:4245
ciliumSocketPath: /var/run/cilium/cilium.sock

triggers:
  httpErrors:
    enabled: true
    statusCodes: [500, 502, 503, 504]
  drops:
    enabled: true
  dnsFailures:
    enabled: true
    rcodes: [NXDOMAIN, SERVFAIL, REFUSED]
  latency:
    enabled: true
    thresholdMs: 2000
    windowSize: 10

capture:
  defaultDurationSeconds: 10
  maxSizeBytes: 10485760
  maxConcurrent: 3
  cooldownSeconds: 30
  pcapSourceDir: /data/recorder

server:
  port: 8080

# Send OTLP traces to the Jaeger all-in-one container. Sample everything
# in local dev — it's low-volume and we want to see every capture.
tracing:
  endpoint: jaeger:4317
  sampleRatio: 1.0
