{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "flight-recorder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flight-recorder.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "flight-recorder.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # /metrics scraping from Prometheus (usually in kube-system or monitoring).
    {{- with .Values.networkPolicy.scrapeFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.server.port }}
    {{- end }}
    # /capture, /captures, /ready, /health from operator namespaces.
    {{- with .Values.networkPolicy.apiFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.server.port }}
    {{- end }}
  egress:
    # DNS — both kube-dns in the cluster and the node's resolver are
    # possibilities; allowing UDP/53 anywhere in the cluster keeps this
    # portable across CoreDNS / NodeLocalDNS setups.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Hubble Relay — gRPC to the configured address.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: hubble-relay
      ports:
        - protocol: TCP
          port: 4245
    # OTel collector (if tracing is enabled). Allow anywhere — resolving
    # the actual collector service here would require namespace-specific
    # knowledge the chart doesn't have.
    {{- if .Values.tracing.endpoint }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
    {{- end }}
    # S3 / IMDS / STS — external to the cluster, so allow all egress to
    # non-cluster IPs on 443. NetworkPolicy can't match "any non-pod IP"
    # cleanly, so this relies on the default ALLOW-ALL-EGRESS being
    # narrowed by what's NOT denied by podSelector-based rules.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- toYaml .Values.networkPolicy.clusterCIDRs | nindent 14 }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
