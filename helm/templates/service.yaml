{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flight-recorder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flight-recorder.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "flight-recorder.selectorLabels" . | nindent 4 }}
{{- end }}
