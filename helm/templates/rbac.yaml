{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "flight-recorder.fullname" . }}
  labels:
    {{- include "flight-recorder.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "flight-recorder.fullname" . }}
  labels:
    {{- include "flight-recorder.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "flight-recorder.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "flight-recorder.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
