apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "flight-recorder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flight-recorder.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "flight-recorder.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "flight-recorder.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "flight-recorder.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: flight-recorder
          image: {{ include "flight-recorder.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/flight-recorder/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/flight-recorder
              readOnly: true
            - name: cilium-socket
              mountPath: /var/run/cilium
              readOnly: true
            - name: bpf-fs
              mountPath: {{ .Values.cilium.bpfPath }}
              readOnly: true
            - name: tmp
              mountPath: /tmp/flight-recorder
      volumes:
        - name: config
          configMap:
            name: {{ include "flight-recorder.fullname" . }}-config
        - name: cilium-socket
          hostPath:
            path: /var/run/cilium
            type: DirectoryOrCreate
        - name: bpf-fs
          hostPath:
            path: {{ .Values.cilium.bpfPath }}
            type: DirectoryOrCreate
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpDirSize }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
