services:
  # Local S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create the flight-recorder bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/flight-recorder-pcaps &&
      mc anonymous set download local/flight-recorder-pcaps &&
      echo 'Bucket ready'
      "

  # Mock Cilium agent — serves recorder API on Unix socket
  mock-cilium:
    build:
      context: .
      target: mock-cilium
    environment:
      CILIUM_SOCKET_PATH: /var/run/cilium/cilium.sock
      PCAP_OUTPUT_DIR: /data/recorder
    volumes:
      - cilium-socket:/var/run/cilium
      - pcap-data:/data/recorder

  # Mock Hubble Relay — generates fake flow events via gRPC
  mock-hubble:
    build:
      context: .
      target: mock-hubble
    environment:
      HUBBLE_LISTEN_ADDR: ":4245"
    ports:
      - "4245:4245"

  # The Flight Recorder itself
  flight-recorder:
    build:
      context: .
      target: flight-recorder
    command: ["--config", "/etc/flight-recorder/config.yaml"]
    depends_on:
      mock-cilium:
        condition: service_started
      mock-hubble:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_NAME: docker-local
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    ports:
      - "8080:8080"
    volumes:
      - ./testdata/config-local.yaml:/etc/flight-recorder/config.yaml:ro
      - cilium-socket:/var/run/cilium
      - pcap-data:/data/recorder

volumes:
  minio-data:
  cilium-socket:
  pcap-data:
